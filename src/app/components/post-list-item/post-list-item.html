@if(post) {
<article class="card border-0 shadow-sm h-100" style="margin-bottom: 1em;">
    <div class="card-body">
        <h3 class="h5 card-title mb-3">{{ post.title }}</h3>
        <p class="card-text text-secondary">{{ post.content }}</p>
        <div class="d-flex justify-content-between align-items-center mt-3">
            <span class="badge rounded-pill text-bg-light border ms-3 text-center">
                {{ post.category?.name || "Uncategorized" }}
            </span>
            <small class="text-muted">{{
                (post.createdDate || post.createdDate) | date : "medium"
                }}</small>
        </div>
    </div>
</article>
}
