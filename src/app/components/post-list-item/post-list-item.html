<!-- <app-post-list-item [post]="post"></app-post-list-item> -->
@if (post) {
<div class="pt-4 p-2">
    <h3>{{post.title}}</h3>
    <p>{{post.content}}</p>
    <div>
        <span class="badge rounded-pill text-bg-light">
            {{post.Category.name}}
        </span>
        <span>
            {{post.creadDate | date : "medium"}}
        </span>
    </div>
</div>
}
